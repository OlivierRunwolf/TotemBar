<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#2a2418"/>
      <stop offset="100%" stop-color="#0c0a06"/>
    </radialGradient>
    <linearGradient id="fire" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7a3d"/>
      <stop offset="100%" stop-color="#c63a0a"/>
    </linearGradient>
    <linearGradient id="earth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b07a36"/>
      <stop offset="100%" stop-color="#5e3c10"/>
    </linearGradient>
    <linearGradient id="air" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8f1ff"/>
      <stop offset="100%" stop-color="#7fb7d6"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a8fff"/>
      <stop offset="100%" stop-color="#0a3a8a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="3" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.6"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Backdrop -->
  <rect width="512" height="512" rx="64" fill="url(#bgGlow)"/>
  <rect x="4" y="4" width="504" height="504" rx="60" fill="none" stroke="#3b2f1a" stroke-width="2"/>

  <!-- Four element tiles, 2x2 grid -->
  <g filter="url(#softShadow)">
    <!-- Fire (top-left) -->
    <rect x="72"  y="72"  width="172" height="172" rx="22" fill="url(#fire)"/>
    <!-- Earth (top-right) -->
    <rect x="268" y="72"  width="172" height="172" rx="22" fill="url(#earth)"/>
    <!-- Air (bottom-left) -->
    <rect x="72"  y="268" width="172" height="172" rx="22" fill="url(#air)"/>
    <!-- Water (bottom-right) -->
    <rect x="268" y="268" width="172" height="172" rx="22" fill="url(#water)"/>
  </g>

  <!-- Element runes (stylized: flame, mountain, swirl, drop) -->
  <g fill="rgba(255,255,255,0.92)" stroke="rgba(0,0,0,0.25)" stroke-width="1.5" stroke-linejoin="round">
    <!-- Flame -->
    <path d="M 158 110
             c -8 18 -22 28 -22 50
             c 0 24 18 42 42 42
             c 24 0 42 -18 42 -42
             c 0 -20 -16 -34 -26 -52
             c -2 14 -10 22 -18 22
             c -10 0 -12 -10 -18 -20 Z"/>
    <!-- Mountain (Earth) -->
    <path d="M 290 200
             L 330 130
             L 360 168
             L 380 142
             L 418 200 Z"/>
    <circle cx="360" cy="118" r="9" fill="rgba(255,255,255,0.92)"/>
    <!-- Wind swirl (Air) -->
    <path d="M 110 320
             c 20 -12 60 -12 80 0
             c 12 8 0 20 -12 16
             c -10 -3 -2 -12 6 -10" fill="none" stroke="rgba(0,40,70,0.55)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 110 360
             c 30 -10 70 -10 96 4" fill="none" stroke="rgba(0,40,70,0.55)" stroke-width="10" stroke-linecap="round"/>
    <path d="M 110 396
             c 18 -8 50 -8 70 2
             c 10 5 4 14 -4 12" fill="none" stroke="rgba(0,40,70,0.55)" stroke-width="10" stroke-linecap="round"/>
    <!-- Water drop -->
    <path d="M 354 296
             c -14 22 -28 36 -28 60
             c 0 22 14 36 28 36
             c 14 0 28 -14 28 -36
             c 0 -24 -14 -38 -28 -60 Z"/>
    <ellipse cx="346" cy="350" rx="6" ry="10" fill="rgba(255,255,255,0.65)"/>
  </g>

  <!-- Inner separator cross suggesting the "bar" structure -->
  <line x1="256" y1="72"  x2="256" y2="440" stroke="rgba(0,0,0,0.35)" stroke-width="4" stroke-linecap="round"/>
  <line x1="72"  y1="256" x2="440" y2="256" stroke="rgba(0,0,0,0.35)" stroke-width="4" stroke-linecap="round"/>

  <!-- Subtle highlight on each tile (gloss) -->
  <g fill="rgba(255,255,255,0.10)">
    <rect x="80"  y="80"  width="156" height="56" rx="18"/>
    <rect x="276" y="80"  width="156" height="56" rx="18"/>
    <rect x="80"  y="276" width="156" height="56" rx="18"/>
    <rect x="276" y="276" width="156" height="56" rx="18"/>
  </g>
</svg>
